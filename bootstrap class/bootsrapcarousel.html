<div class="container-fluid">
    <h1>Bootstrap carousel(slide show)</h1>
    <p>The carousel is used to creat an image slider or content
         slideshow that automatically changes slide</p>


<div id="demoCarousel" class="carousel slide" data-bs-ride="carousel">
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0"
         class="active"></button>
         <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1">active</button>
         <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2">active</button>
    </div>



<div class="carousel-inner">

<div class="carousel-item active">
    <img src="images/Attention.JPG" class="d-block w-100" alt="slide 1">
    <div class="carousel-caption d-none d-md-block">
        <h5>Welcom to Bootstrap</h5>
        <p>Build Responsive website easily</p>
    </div>
</div>


<div class="carousel-item">
    <img src="images/pixel.JPG" class="d-block w-100" alt="slide 2">
    <div class="carousel-caption d-none d-md-block">
        <h5>Learn with Ease</h5>
        <p>Powerful component at your finger</p>
    </div>
</div>

<div class="carousel-item">
    <img src="images/hair.JPG" class="d-block w-100" alt="slide 3">
    <div class="carousel-caption d-none d-md-block">
        <h5>Mordern & Beatiful</h5>
        <p>Make your website look professional</p>
    </div>
</div>
</div>


<button class="carousel-control-prev" type="button" data-bs-target="#demoCarousel"
 data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
</button>
<button class="carousel-control-next" type="button" data-bs-target="#demoCarousel"
    data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
</button>




</div>

</div>
